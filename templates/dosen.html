{% extends 'base.html' %}

{% block content %}

<div class="card shadow-lg p-4">

<h2>Daftar Dosen</h2>

<table class="table table-hover table-bordered">

<thead>

<tr>
    <th>Nama Dosen</th>
    <th>NIDN</th>
    <th>Mata Kuliah</th>
</tr>

</thead>

<tbody>

{% for dosen in dosen_list %}

<tr>

<td>{{ dosen.nama }}</td>
<td>{{ dosen.nidn }}</td>
<td>{{ dosen.matkul }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
